name: Build and Push Multi-Architecture Image

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

# Allow the built-in GITHUB_TOKEN to push packages to this repo's GHCR namespace.
permissions:
  contents: read
  packages: write

jobs:
  build:
    name: Build and Push Multi-Architecture Image to GHCR
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v3

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v2
        with:
          platforms: linux/amd64,linux/arm64

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v2

      # Image name follows this repo's owner, lowercased (GHCR requires lowercase).
      - name: Compute image name
        id: image
        run: echo "name=ghcr.io/$(echo '${{ github.repository_owner }}' | tr '[:upper:]' '[:lower:]')/audiobookbay-automated" >> "$GITHUB_OUTPUT"

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v2
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and Push Multi-Architecture Image
        uses: docker/build-push-action@v5
        with:
          context: .
          # Build on PRs (validation) but only push on pushes to main.
          push: ${{ github.event_name != 'pull_request' }}
          tags: |
            ${{ steps.image.outputs.name }}:latest
          platforms: linux/amd64,linux/arm64
