name: Test, Build and Push Multi-Architecture Image

on:
  push:
    branches:
      - main
      - dev
  pull_request:
    branches:
      - main
      - dev
  workflow_dispatch: {}

# Allow the built-in GITHUB_TOKEN to push packages to this repo's GHCR namespace.
permissions:
  contents: read
  packages: write

jobs:
  # The suite gates every image: no green tests, no published tag.
  test:
    name: Test suite
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: app/requirements-dev.txt

      - name: Install dependencies
        run: pip install -r app/requirements-dev.txt

      - name: Run pytest
        run: python -m pytest app -q

      - name: Syntax-check client JS
        run: node --check app/abb/static/js/app.js && node --check app/abb/static/js/icons.js

  build:
    name: Build and Push Multi-Architecture Image to GHCR
    runs-on: ubuntu-latest
    needs: test

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3
        with:
          platforms: linux/amd64,linux/arm64

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      # Image name follows this repo's owner, lowercased (GHCR requires lowercase).
      # Every build also gets a tag derived from its branch (e.g.
      # feature/smart-sort-gemini -> :feature-smart-sort-gemini) so a branch can
      # be deployed and rolled back without disturbing :latest. Only main also
      # moves :latest.
      - name: Compute image tags
        id: image
        run: |
          name=ghcr.io/$(echo '${{ github.repository_owner }}' | tr '[:upper:]' '[:lower:]')/audiobookbay-automated
          slug=$(echo '${{ github.ref_name }}' | tr '/' '-' | tr -c 'a-zA-Z0-9._-' '-')
          tags="$name:$slug"
          if [ '${{ github.ref_name }}' = 'main' ]; then
            tags="$tags"$'\n'"$name:latest"
          fi
          {
            echo "tags<<EOF"
            echo "$tags"
            echo "EOF"
          } >> "$GITHUB_OUTPUT"

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and Push Multi-Architecture Image
        uses: docker/build-push-action@v6
        with:
          context: .
          # Build on PRs (validation) but only push on pushes / manual runs.
          push: ${{ github.event_name != 'pull_request' }}
          tags: ${{ steps.image.outputs.tags }}
          platforms: linux/amd64,linux/arm64
