version: '3.8'

services:
  audiobookbay-automated:
    image: ghcr.io/dhamma-dev/audiobookbay-automated:latest
    ports:
      - "5078:5078"
    container_name: audiobookbay-automated
    environment:
      - DOWNLOAD_CLIENT=${DOWNLOAD_CLIENT}
      # Put.io auth: either OAuth (CLIENT_ID/SECRET, "Log in with Put.io") or a
      # static PUTIO_ACCESS_TOKEN. See the README for setup.
      - PUTIO_CLIENT_ID=${PUTIO_CLIENT_ID}
      - PUTIO_CLIENT_SECRET=${PUTIO_CLIENT_SECRET}
      - PUTIO_ACCESS_TOKEN=${PUTIO_ACCESS_TOKEN}
      - PUTIO_SAVE_PARENT_ID=${PUTIO_SAVE_PARENT_ID}
      - DL_HOST=${DL_HOST}
      - DL_PORT=${DL_PORT}
      - DL_USERNAME=${DL_USERNAME}
      - DL_PASSWORD=${DL_PASSWORD}
      - DL_CATEGORY=${DL_CATEGORY}
      - SAVE_PATH_BASE=${SAVE_PATH_BASE}
      - NAV_LINK_NAME=${NAV_LINK_NAME}
      - NAV_LINK_URL=${NAV_LINK_URL}
      # AudiobookBay requests are routed through Tor by default. Set USE_TOR=false
      # to disable, or tune the optional knobs below.
      # USE_TOR sets the DEFAULT route (Tor vs Direct); each user can toggle in
      # the UI and renew the Tor circuit. Tor still runs unless TOR_AUTOSTART=false.
      - USE_TOR=${USE_TOR:-true}
      - TOR_SOCKS_PORT=${TOR_SOCKS_PORT:-9050}
      - TOR_CONTROL_PORT=${TOR_CONTROL_PORT:-9051}
      - TOR_BOOTSTRAP_TIMEOUT=${TOR_BOOTSTRAP_TIMEOUT:-90}
      # Smart sort (optional): set GEMINI_API_KEY in .env to enable the button.
      # This call goes directly to Google, not through Tor. See the README.
      - GEMINI_API_KEY=${GEMINI_API_KEY}
      - RANK_MODEL=${RANK_MODEL:-gemini-3.5-flash}
    env_file:
      - .env